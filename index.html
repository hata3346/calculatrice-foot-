<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foot Calc ⚽</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="calculator">
    <div class="header">
      <h1>⚽ FOOT CALC</h1>
      <p>Calculatrice sombre style terrain de foot</p>
    </div>

    <div class="screen">
      <input type="text" id="display" readonly />
      <div class="line"></div>
    </div>

    <div class="buttons">
      <button class="red" onclick="clearDisplay()">C</button>
      <button class="gray" onclick="deleteLast()">←</button>
      <button class="operator" onclick="appendValue('%')">%</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button onclick="appendValue('0')">0</button>
      <button onclick="appendValue('.')">.</button>
      <button onclick="appendValue('(')">(</button>
      <button onclick="appendValue(')')">)</button>

      <button class="goal" onclick="calculate()">= GOAL ⚽</button>
    </div>

    <div class="footer">
      Noir + vert terrain + touche rouge 🔥
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
